---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/volsync.backube/replicationsource_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: ${APP}
spec:
  sourcePVC: ${APP}
  trigger:
    schedule: ${VOLSYNC_SCHEDULE:=0 * * * *}
  kopia:
    cacheAccessModes:
      - ${VOLSYNC_CACHE_ACCESSMODES:=ReadWriteOnce}
    cacheCapacity: ${VOLSYNC_CACHE_CAPACITY:=5Gi}
    cacheStorageClassName: ${VOLSYNC_CACHE_STORAGECLASS:=openebs-hostpath}
    compression: ${VOLSYNC_COMPRESSION:=zstd-fastest}
    copyMethod: ${VOLSYNC_COPYMETHOD:=Direct}
    moverSecurityContext:
      runAsUser: ${VOLSYNC_PUID:=1000}
      runAsGroup: ${VOLSYNC_PGID:=1000}
      fsGroup: ${VOLSYNC_PGID:=1000}
    moverVolumes:
      - mountPath: repository
        volumeSource:
          nfs:
            server: ${VOLSYNC_REPOSITORY_SERVER:=192.168.1.7}
            path: ${VOLSYNC_REPOSITORY_PATH:=/mnt/oasis/Backups/Kopia}
    parallelism: ${VOLSYNC_PARALLELISM:=2}
    repository: ${APP}-volsync-secret
    retain:
      hourly: ${VOLSYNC_RETAIN_HOURLY:=24}
      daily: ${VOLSYNC_RETAIN_DAILY:=7}
    storageClassName: ${VOLSYNC_STORAGECLASS:=openebs-hostpath}
