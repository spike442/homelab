---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: victoria-logs-appdata-pv
spec:
  capacity:
    storage: 20Gi
  accessModes:
  - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
  - nfsvers=4.2
  - nconnect=16
  - hard
  - noatime
  nfs:
    server: 192.168.1.17
    path: /mnt/oasis/Appdata/victoria-logs
