---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-lan
  annotations:
    lbipam.cilium.io/ips: 192.168.1.203
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  selector:
    app.kubernetes.io/name: prometheus
    operator.prometheus.io/name: kube-prometheus-stack
  ports:
  - name: http
    port: 80
    targetPort: 9090
