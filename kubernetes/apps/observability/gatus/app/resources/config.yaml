---
connectivity:
  checker:
    target: 1.1.1.1:53
    interval: 1m

alerting:
  pushover:
    application-token: ${GATUS_PUSHOVER_TOKEN}
    default-alert:
      description: health-check failed
      failure-threshold: 3
      minimum-reminder-interval: 1h
      send-on-resolved: true
      success-threshold: 2
    priority: 1
    resolved-priority: 0
    title: Gatus
    user-key: ${GATUS_PUSHOVER_USER_KEY}

endpoints:
- name: Gatus
  group: observability
  url: http://gatus.observability.svc.cluster.local/health
  interval: 1m
  conditions:
  - "[STATUS] == 200"

- name: Grafana
  group: observability
  url: http://grafana-service.observability.svc.cluster.local:3000/api/health
  interval: 1m
  conditions:
  - "[STATUS] == 200"

- name: Prometheus
  group: observability
  url: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090/-/healthy
  interval: 1m
  conditions:
  - "[STATUS] == 200"

- name: Alertmanager
  group: observability
  url: http://kube-prometheus-stack-alertmanager.observability.svc.cluster.local:9093/-/healthy
  interval: 1m
  conditions:
  - "[STATUS] == 200"

- name: Echo
  group: network
  url: http://echo.network.svc.cluster.local/healthz
  interval: 1m
  conditions:
  - "[STATUS] == 200"

- name: Kafka UI
  group: datalakehouse
  url: http://kafka-ui.datalakehouse.svc.cluster.local:8080/
  interval: 1m
  conditions:
  - "[STATUS] == 200"

- name: MinIO Console
  group: datalakehouse
  url: http://minio-console.datalakehouse.svc.cluster.local:9001/
  interval: 1m
  conditions:
  - "[STATUS] == 200"

- name: Victoria Logs
  group: observability
  url: http://victoria-logs-server.observability.svc.cluster.local:9428/select/vmui/
  interval: 1m
  conditions:
  - "[STATUS] == 200"

metrics: true

storage:
  type: sqlite
  caching: true
  path: ${GATUS_CONFIG_PATH}/gatus.db

ui:
  title: Status | Gatus
  header: Status
  logo: https://avatars.githubusercontent.com/u/13041487
  link: https://github.com/spike442
  buttons:
  - name: Github
    link: https://github.com/spike442

web:
  port: ${GATUS_WEB_PORT}
