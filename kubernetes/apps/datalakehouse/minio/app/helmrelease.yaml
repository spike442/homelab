---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
spec:
  interval: 1h
  chart:
    spec:
      chart: minio
      version: "5.4.0"
      sourceRef:
        kind: HelmRepository
        name: minio
  install:
    remediation:
      retries: -1
  values:
    mode: standalone
    existingSecret: minio-secret
    persistence:
      enabled: true
      storageClass: nfs
      size: 20Gi
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 1Gi
    buckets:
    - name: lakehouse
      policy: none
    consoleIngress:
      enabled: false
