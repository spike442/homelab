---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: redis
  install:
    remediation:
      retries: -1
  values:
    architecture: standalone
    auth:
      enabled: false
