# yaml-language-server: $schema=https://raw.githubusercontent.com/Altinity/clickhouse-operator/master/deploy/helm/clickhouse-operator/crds/CustomResourceDefinition-clickhouseinstallations.clickhouse.altinity.com.yaml
---
apiVersion: clickhouse.altinity.com/v1
kind: ClickHouseInstallation
metadata:
  name: clickhouse-cluster
  namespace: datalakehouse
spec:
  templates:
    podTemplates:
    - name: pod-template
      spec:
        containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:26.2
          resources:
            requests:
              cpu: 100m
              memory: 2Gi
            limits:
              memory: 4Gi
          securityContext:
            runAsUser: 101
            runAsGroup: 101
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ "ALL" ]
          env:
          - name: CLICKHOUSE_DB
            value: default
          - name: CLICKHOUSE_USER
            value: default
          - name: CLICKHOUSE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: clickhouse-admin-password
                key: CLICKHOUSE_PASSWORD
          volumeMounts:
          - name: clickhouse-tls
            mountPath: /etc/clickhouse-server/tls
            readOnly: true
        securityContext:
          runAsUser: 101
          runAsGroup: 101
          fsGroup: 101
          fsGroupChangePolicy: OnRootMismatch
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    clickhouse.altinity.com/chi: clickhouse-cluster
                topologyKey: kubernetes.io/hostname
        volumes:
        - name: clickhouse-tls
          secret:
            secretName: timcasa-me-tls
    serviceTemplates:
    - name: clickhouse-service
      spec:
        ports:
        - name: http
          port: 8123
        - name: tcp
          port: 9000
        type: ClusterIP
    volumeClaimTemplates:
    - name: clickhouse-data
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
        storageClassName: nfs
  configuration:
    settings:
      tcp_port: "9000"
      http_port: "8123"
      https_port: "8443"
      openSSL/server/certificateFile: /etc/clickhouse-server/tls/tls.crt
      openSSL/server/privateKeyFile: /etc/clickhouse-server/tls/tls.key
      path: /var/lib/clickhouse/
      logger/level: information
      logger/log: /var/log/clickhouse-server/clickhouse-server.log
      logger/errorlog: /var/log/clickhouse-server/clickhouse-server.err.log
      logger/size: 1000M
      logger/count: "10"
    users:
      default/password_env: CLICKHOUSE_PASSWORD
      default/profile: default
      default/quota: default
      default/access_management: "1"
      default/networks/host_regexp: ^localhost$|^.*\.svc\.cluster\.local$
      default/networks/ip:
      - "::1"
      - "127.0.0.1"
      - "10.42.0.0/16"
      - "::ffff:10.42.0.0/112"
    clusters:
    - name: main
      layout:
        shardsCount: 1
        replicasCount: 1
      templates:
        podTemplate: pod-template
        serviceTemplate: clickhouse-service
        volumeClaimTemplate: clickhouse-data
