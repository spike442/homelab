---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: airflow
spec:
  dependsOn:
  - name: external-secrets
    namespace: external-secrets
  - name: pg-cluster
    namespace: database
  interval: 1h
  path: ./kubernetes/apps/datalakehouse/airflow/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: datalakehouse
  wait: false
