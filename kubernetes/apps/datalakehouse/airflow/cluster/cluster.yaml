---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: airflow-pg
spec:
  instances: 1
  bootstrap:
    initdb:
      database: airflow
      owner: airflow
      secret:
        name: airflow-pg-credentials
  storage:
    storageClass: nfs
    size: 8Gi
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi
