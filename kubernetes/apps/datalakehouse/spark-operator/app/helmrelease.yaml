---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spark-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: spark-operator
      version: "2.5.0"
      sourceRef:
        kind: HelmRepository
        name: spark-operator
  install:
    crds: CreateReplace
    remediation:
      retries: -1
  values:
    controller:
      resources:
        requests:
          cpu: 10m
          memory: 128Mi
        limits:
          memory: 512Mi
    webhook:
      enable: true
