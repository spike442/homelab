---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app adguard-home
spec:
  chartRef:
    kind: OCIRepository
    name: adguard-home
  interval: 1h
  values:
    controllers:
      adguard-home:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: adguard/adguardhome
              tag: v0.107.74
            env:
              TZ: Europe/Paris
            probes:
              liveness: &probe
                type: HTTP
                path: /login.html
              readiness: *probe
              startup: *probe
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                add: [ "NET_BIND_SERVICE" ]
                drop: [ "ALL" ]
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
        pod:
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            fsGroup: 0
            fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: *app
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 192.168.1.211
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: &httpPort 80
          setup:
            port: 3000
          dns-tcp:
            port: 53
            protocol: TCP
          dns-udp:
            port: 53
            protocol: UDP
    route:
      app:
        hostnames:
        - dns.timcasa.me
        parentRefs:
        - name: envoy-internal
          namespace: network
    persistence:
      config:
        existingClaim: *app
        globalMounts:
        - path: /opt/adguardhome/conf
          subPath: conf
        - path: /opt/adguardhome/work
          subPath: work
      tmp:
        type: emptyDir
