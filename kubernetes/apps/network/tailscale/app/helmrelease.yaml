---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: tailscale-operator
      version: "1.96.5"
      sourceRef:
        kind: HelmRepository
        name: tailscale
  valuesFrom:
  - kind: Secret
    name: tailscale-operator-secret
    valuesKey: TAILSCALE_OAUTH_CLIENT_ID
    targetPath: oauth.clientId
  - kind: Secret
    name: tailscale-operator-secret
    valuesKey: TAILSCALE_OAUTH_CLIENT_SECRET
    targetPath: oauth.clientSecret
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    operatorConfig:
      hostname: tailscale-operator
      image:
        repository: ghcr.io/tailscale/k8s-operator
        tag: v1.96.5
