---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: filebrowser
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: filebrowser-secret
    template:
      engineVersion: v2
      data:
        FB_USERNAME: "{{ .FB_USERNAME }}"
        FB_PASSWORD: "{{ .FB_PASSWORD }}"
  dataFrom:
  - extract:
      key: filebrowser
