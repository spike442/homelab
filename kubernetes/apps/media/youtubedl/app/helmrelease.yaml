---
# adapted from https://github.com/clarknova99/talos-cluster/tree/main/_archive/youtubedl
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: youtubedl
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    force: true
    remediation:
      retries: 3
  values:
    controllers:
      youtubedl:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/tzahi12345/youtubedl-material
              tag: nightly
            env:
              TZ: Europe/Paris
              write_ytdl_config: "true"
              UID: "1000"
              GID: "1000"
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 192.168.1.207
        externalTrafficPolicy: Cluster
        controller: youtubedl
        ports:
          http:
            port: 17442
    route:
      app:
        hostnames:
        - yt.timcasa.me
        parentRefs:
        - name: envoy-internal
          namespace: network
        rules:
        - backendRefs:
          - name: youtubedl
            port: 17442
    persistence:
      config:
        existingClaim: youtubedl
        globalMounts:
        - path: /app/appdata
      media:
        type: nfs
        server: 192.168.1.7
        path: /mnt/oasis/Media/Youtube
        globalMounts:
        - path: /app/video
